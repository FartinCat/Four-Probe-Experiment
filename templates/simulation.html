{% extends "base.html" %}
{% block title %}Simulation — Four-Probe Lab{% endblock %}
{% block heading %}Interactive Simulation{% endblock %}

{% block content %}
<div class="card">
    <div class="section-label">Circuit Diagram</div>
    <canvas id="sim-canvas" height="300"></canvas>
</div>

<div class="card">
    <div class="section-label">Controls</div>
    <div class="ctrl-grid">
        <div class="ctrl-group">
            <label>Current I (mA)</label>
            <input type="range" id="ctrl-I" min="1" max="20" step="0.5" value="{{ I_def }}" oninput="onSlider()" />
            <div class="ctrl-val" id="disp-I">{{ I_def }} mA</div>
        </div>
        <div class="ctrl-group">
            <label>Temperature T (K)</label>
            <input type="range" id="ctrl-T" min="300" max="450" step="5" value="300" oninput="onSlider()" />
            <div class="ctrl-val" id="disp-T">300 K</div>
        </div>
        <div class="ctrl-group">
            <label>Thickness W (cm)</label>
            <input type="range" id="ctrl-W" min="0.02" max="0.10" step="0.01" value="{{ W_def }}"
                oninput="onSlider()" />
            <div class="ctrl-val" id="disp-W">{{ W_def }} cm</div>
        </div>
    </div>

    <div class="meters-grid">
        <div class="meter"><label>Voltage V (inner)</label><span class="mval" id="m-V">—</span><span
                class="munit">mV</span></div>
        <div class="meter"><label>Resistance R</label><span class="mval" id="m-R">—</span><span class="munit">Ω</span>
        </div>
        <div class="meter"><label>Resistivity ρ</label><span class="mval" id="m-rho">—</span><span
                class="munit">Ω·cm</span></div>
        <div class="meter"><label>1/T × 10³</label><span class="mval" id="m-invT">—</span><span class="munit">K⁻¹</span>
        </div>
        <div class="meter"><label>ln(ρ)</label><span class="mval" id="m-lnrho">—</span><span class="munit"></span></div>
        <div class="meter"><label>T (°C)</label><span class="mval" id="m-TC">—</span><span class="munit">°C</span></div>
    </div>

    <div class="btn-row" style="margin-top:16px;">
        <button class="btn btn-primary" onclick="recordToTable()">📥 Record to Observation Table</button>
        <button class="btn btn-secondary" onclick="onSlider()">🔄 Refresh</button>
    </div>
    <div id="sim-msg" class="msg"></div>
</div>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/simulation.js') }}"></script>
{% endblock %}
